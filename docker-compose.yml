version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: saas_ticketing_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saas_ticketing
      POSTGRES_USER: ticketing_user
      POSTGRES_PASSWORD: ticketing_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing_user -d saas_ticketing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
